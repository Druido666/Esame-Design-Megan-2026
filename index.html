<!DOCTYPE html>
<html lang="it">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0" />
  <title>Opera Interattiva Video + Mouse + Audio</title>

  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html {
      overflow: hidden;
      height: 100%;
    }

    body {
      overflow: hidden;
      background: black;
      width: 100%;
      height: 100%;
      height: -webkit-fill-available;
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: crosshair;
      font-family: Arial, sans-serif;
      /* impedisce scroll su iOS */
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
    }

    #container {
      position: absolute;
      inset: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      perspective: 1200px;
      overflow: hidden;
      /* FONDAMENTALE: cattura tutti gli eventi touch */
      touch-action: none;
    }

    video {
      width: 60vw;
      max-width: 900px;
      min-width: min(80vw, 280px);
      border-radius: 20px;
      box-shadow: 0 0 40px rgba(255, 255, 255, 0.15);
      filter: contrast(1.1) saturate(1.2);
      transform-style: preserve-3d;
      will-change: transform, filter;
      /* non bloccare gli eventi sul video stesso */
      pointer-events: none;
      user-select: none;
      -webkit-user-select: none;
      /* nessuna transition: la aggiorniamo via JS per fluidità */
    }

    video::-webkit-media-controls,
    video::-webkit-media-controls-panel,
    video::-webkit-media-controls-play-button,
    video::-webkit-media-controls-start-playback-button,
    video::-webkit-media-controls-overlay-play-button,
    video::-webkit-media-controls-enclosure {
      display: none !important;
      opacity: 0 !important;
      pointer-events: none !important;
    }

    #overlay {
      position: absolute;
      top: 20px;
      left: 20px;
      color: white;
      z-index: 10;
      font-size: 13px;
      opacity: 0.8;
      letter-spacing: 1px;
      pointer-events: none;
    }

    #tap-hint {
      position: absolute;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.6);
      font-size: 12px;
      letter-spacing: 2px;
      text-transform: uppercase;
      pointer-events: none;
      z-index: 10;
      animation: blink 2s ease-in-out infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 0.6; }
      50%       { opacity: 0.1; }
    }

    .pulse {
      animation: pulse 0.4s ease !important;
    }

    @keyframes pulse {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.03); }
      100% { transform: scale(1); }
    }

    canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      mix-blend-mode: screen;
    }
  </style>
</head>

<body>

  <div id="container">
    <div id="overlay">MUOVI · TOCCA PER AUDIO</div>
    <div id="tap-hint">TOCCA PER INIZIARE</div>
    <canvas id="visualizer"></canvas>
    <video id="video" autoplay muted loop playsinline webkit-playsinline x5-playsinline>
      <source src="VIDEO-2026-04-22-16-03-51.mp4" type="video/mp4">
    </video>
  </div>

  <script>
    const video   = document.getElementById('video');
    const canvas  = document.getElementById('visualizer');
    const ctx     = canvas.getContext('2d');
    const tapHint = document.getElementById('tap-hint');
    const container = document.getElementById('container');

    // ── Resize canvas ─────────────────────────────────────────────
    function resizeCanvas() {
      canvas.width  = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    // ── Audio ─────────────────────────────────────────────────────
    let audioCtx     = null;
    let analyser     = null;
    let dataArray    = null;
    let audioStarted = false;

    function initAudio() {
      if (audioStarted) return;
      audioStarted = true;
      tapHint.style.display = 'none';

      audioCtx  = new (window.AudioContext || window.webkitAudioContext)();
      analyser  = audioCtx.createAnalyser();
      analyser.fftSize = 256;

      const src = audioCtx.createMediaElementSource(video);
      src.connect(analyser);
      analyser.connect(audioCtx.destination);
      dataArray = new Uint8Array(analyser.frequencyBinCount);

      video.muted = false;
      audioCtx.resume().then(() => video.play().catch(() => {}));
    }

    // ── Transform ─────────────────────────────────────────────────
    const W = () => window.innerWidth;
    const H = () => window.innerHeight;

    function applyTransform(x, y) {
      const dx = x - W() / 2;
      const dy = y - H() / 2;

      const moveX   = dx * 0.08;
      const moveY   = dy * 0.08;
      const scale   = 1 + Math.abs(dx + dy) * 0.00015;
      const rotateY = dx * 0.05;
      const rotateX = -dy * 0.05;
      const rotateZ = dx * 0.015;
      const blur      = Math.abs(dx) * 0.008;
      const brightness = 1 + Math.abs(dy) * 0.0008;

      video.style.transform = `
        translateX(${moveX}px)
        translateY(${moveY}px)
        rotateX(${rotateX}deg)
        rotateY(${rotateY}deg)
        rotateZ(${rotateZ}deg)
        scale(${scale})
      `;

      video.style.filter = `
        contrast(1.4)
        saturate(1.6)
        brightness(${brightness})
        blur(${blur}px)
        hue-rotate(${dx * 0.08}deg)
      `;

      document.body.style.background = `
        radial-gradient(circle at ${x}px ${y}px,
        rgba(40,40,60,1), rgba(0,0,0,1) 60%)
      `;
    }

    // ── Pulse ─────────────────────────────────────────────────────
    function triggerPulse() {
      video.classList.remove('pulse');
      void video.offsetWidth; // reflow per riavviare animazione
      video.classList.add('pulse');
      setTimeout(() => video.classList.remove('pulse'), 400);
    }

    // ── MOUSE ─────────────────────────────────────────────────────
    window.addEventListener('mousemove', (e) => {
      applyTransform(e.clientX, e.clientY);
    });

    window.addEventListener('click', () => {
      initAudio();
      triggerPulse();
    });

    // ── TOUCH ─────────────────────────────────────────────────────
    // Usiamo PointerEvents dove disponibili (più affidabili su mobile),
    // con fallback agli eventi Touch classici.

    if (window.PointerEvent) {

      // PointerEvents: gestisce mouse, touch e stylus unificati
      container.addEventListener('pointerdown', (e) => {
        e.preventDefault();
        container.setPointerCapture(e.pointerId); // cattura tutti i move anche fuori
        initAudio();
        applyTransform(e.clientX, e.clientY);
      }, { passive: false });

      container.addEventListener('pointermove', (e) => {
        e.preventDefault();
        if (e.buttons === 0 && e.pointerType === 'touch') return;
        applyTransform(e.clientX, e.clientY);
      }, { passive: false });

      container.addEventListener('pointerup', (e) => {
        e.preventDefault();
        triggerPulse();
      }, { passive: false });

    } else {

      // Fallback Touch Events (Safari vecchio, Android base)
      container.addEventListener('touchstart', (e) => {
        e.preventDefault();
        initAudio();
        const t = e.touches[0];
        applyTransform(t.clientX, t.clientY);
      }, { passive: false });

      container.addEventListener('touchmove', (e) => {
        e.preventDefault();
        const t = e.touches[0];
        applyTransform(t.clientX, t.clientY);
      }, { passive: false });

      container.addEventListener('touchend', (e) => {
        e.preventDefault();
        triggerPulse();
      }, { passive: false });
    }

    // ── Visualizer ────────────────────────────────────────────────
    function animateVisualizer() {
      requestAnimationFrame(animateVisualizer);
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      const data = dataArray || new Uint8Array(128).fill(0);
      if (analyser) analyser.getByteFrequencyData(data);

      for (let i = 0; i < data.length; i++) {
        const v = data[i];
        const x = (canvas.width / data.length) * i;
        const h = v * 1.8;

        ctx.fillStyle = `rgba(${v + 50}, ${100 + v}, 255, 0.15)`;
        ctx.fillRect(x, canvas.height - h, 8, h);

        ctx.beginPath();
        ctx.arc(canvas.width / 2, canvas.height / 2, v * 1.5, 0, Math.PI * 2);
        ctx.strokeStyle = 'rgba(255,255,255,0.02)';
        ctx.stroke();
      }
    }

    animateVisualizer();
    video.play().catch(() => {});
  </script>

</body>
</html>
